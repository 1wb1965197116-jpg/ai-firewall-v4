<!DOCTYPE html>
<html>
<head>
  <title>AI Firewall Dashboard</title>
</head>
<body>

<h2>AI Firewall Dashboard</h2>

<input id="username" placeholder="username">
<input id="password" placeholder="password" type="password">
<button onclick="login()">Login</button>

<pre id="feed"></pre>

<script>
let token = "";

async function login() {
  const res = await fetch("https://YOUR-RENDER-URL.onrender.com/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  token = data.token;

  startSocket();
}

function startSocket() {
  const socket = new WebSocket("wss://YOUR-RENDER-URL.onrender.com");

  socket.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.user && data.user !== username.value) return;

    feed.innerText =
      JSON.stringify(data, null, 2) + "\n\n" + feed.innerText;
  };
}
</script>

</body>
</html>
